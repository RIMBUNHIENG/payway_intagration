<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Management System</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 24px;
        }

        .user-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .section h2 {
            color: #1f2937;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #374151;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .card h3 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card .price {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .card .features {
            list-style: none;
            margin: 15px 0;
        }

        .card .features li {
            padding: 8px 0;
            color: #6b7280;
            border-bottom: 1px solid #e5e7eb;
        }

        .card .features li:last-child {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-active {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-canceled {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-trialing {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-past_due {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-admin {
            background: #fce7f3;
            color: #9f1239;
        }

        .badge-user {
            background: #e0e7ff;
            color: #3730a3;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .hidden {
            display: none;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: #f3f4f6;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            color: #6b7280;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
        }

        #card-element {
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: white;
        }

        .history-item {
            padding: 15px;
            background: #f9fafb;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .history-item .action {
            font-weight: 600;
            color: #1f2937;
        }

        .history-item .time {
            font-size: 12px;
            color: #6b7280;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Subscription Management</h1>
            <div class="user-info">
                <span id="userDisplay" class="hidden"></span>
                <button id="logoutBtn" class="btn btn-secondary hidden">Logout</button>
            </div>
        </div>

        <div id="alertContainer"></div>

        <!-- Login/Register Section -->
        <div id="authSection" class="section">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <div id="loginForm">
                <h2>Login</h2>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>
            <div id="registerForm" class="hidden">
                <h2>Register</h2>
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLastName" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>

        <!-- Main App Section (Hidden until logged in) -->
        <div id="appSection" class="hidden">
            <!-- Available Plans -->
            <div class="section">
                <h2>Available Subscription Plans</h2>
                <div id="plansGrid" class="grid">
                    <div class="loading">Loading plans...</div>
                </div>
            </div>

            <!-- My Subscriptions -->
            <div class="section">
                <h2>My Subscriptions</h2>
                <div id="mySubscriptions">
                    <div class="loading">Loading your subscriptions...</div>
                </div>
            </div>

            <!-- Admin Section -->
            <div id="adminSection" class="section hidden">
                <h2>Admin: Create Subscription Plan</h2>
                <form onsubmit="handleCreatePlan(event)">
                    <div class="grid">
                        <div class="form-group">
                            <label>Plan Name</label>
                            <input type="text" id="planName" required>
                        </div>
                        <div class="form-group">
                            <label>Price (USD)</label>
                            <input type="number" step="0.01" id="planPrice" required>
                        </div>
                    </div>
                    <div class="grid">
                        <div class="form-group">
                            <label>Interval</label>
                            <select id="planInterval" required>
                                <option value="day">Daily</option>
                                <option value="week">Weekly</option>
                                <option value="month" selected>Monthly</option>
                                <option value="year">Yearly</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Trial Days</label>
                            <input type="number" id="planTrialDays" value="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="planDescription" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Plan</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="hidden"
        style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%;">
            <h2 id="modalTitle">Subscribe to Plan</h2>
            <div id="card-element"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button id="submitPayment" class="btn btn-primary">Subscribe</button>
                <button onclick="closePaymentModal()" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let stripe = null;
        let cardElement = null;
        let selectedPlan = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                loadUser();
            }
        });

        function showAlert(message, type = 'info') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            document.getElementById('alertContainer').appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 5000);
        }
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const data = {
                first_name: document.getElementById('regFirstName').value,
                last_name: document.getElementById('regLastName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok) {
                    token = result.token;
                    localStorage.setItem('token', token);
                    showAlert('Registration successful!', 'success');
                    loadUser();
                } else {
                    showAlert(result.error || 'Registration failed', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();

            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (response.ok) {
                    token = result.token;
                    localStorage.setItem('token', token);
                    showAlert('Login successful!', 'success');
                    loadUser();
                } else {
                    showAlert(result.error || 'Login failed', 'error');
                }
            } catch (error) {
                showAlert('Network error: ' + error.message, 'error');
            }
        }

        async function loadUser() {
            try {
                const response = await fetch(`${API_BASE}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('authSection').classList.add('hidden');
                    document.getElementById('appSection').classList.remove('hidden');
                    document.getElementById('userDisplay').classList.remove('hidden');
                    document.getElementById('userDisplay').innerHTML = `
                        ${currentUser.first_name} ${currentUser.last_name} 
                        <span class="badge badge-${currentUser.role}">${currentUser.role}</span>
                    `;
                    document.getElementById('logoutBtn').classList.remove('hidden');

                    if (currentUser.role === 'admin') {
                        document.getElementById('adminSection').classList.remove('hidden');
                    }

                    loadPlans();
                    loadMySubscriptions();
                } else {
                    logout();
                }
            } catch (error) {
                showAlert('Failed to load user profile', 'error');
                logout();
            }
        }

        function logout() {
            token = null;
            currentUser = null;
            localStorage.removeItem('token');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('userDisplay').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }

        document.getElementById('logoutBtn').addEventListener('click', logout);
        async function loadPlans() {
            try {
                const response = await fetch(`${API_BASE}/subscription-plans`);
                const result = await response.json();

                const plansGrid = document.getElementById('plansGrid');
                if (result.plans && result.plans.length > 0) {
                    plansGrid.innerHTML = result.plans.map(plan => `
                        <div class="card">
                            <h3>${plan.name}</h3>
                            <div class="price">$${(plan.amount / 100).toFixed(2)}</div>
                            <p style="color: #6b7280; margin: 10px 0;">per ${plan.interval}</p>
                            <p>${plan.description || ''}</p>
                            ${plan.trial_period_days > 0 ? `<p style="color: #667eea; font-weight: 600; margin: 10px 0;">🎁 ${plan.trial_period_days} days free trial</p>` : ''}
                            <button class="btn btn-primary" onclick="openSubscribeModal(${plan.id}, '${plan.name}')">
                                Subscribe Now
                            </button>
                        </div>
                    `).join('');
                } else {
                    plansGrid.innerHTML = '<p style="color: #6b7280;">No plans available yet.</p>';
                }
            } catch (error) {
                showAlert('Failed to load plans', 'error');
            }
        }
        async function loadMySubscriptions() {
            try {
                const response = await fetch(`${API_BASE}/subscriptions/my-subscriptions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                const container = document.getElementById('mySubscriptions');
                if (result.subscriptions && result.subscriptions.length > 0) {
                    container.innerHTML = result.subscriptions.map(sub => `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <h3>${sub.plan?.name || 'Subscription'}</h3>
                                    <span class="badge badge-${sub.status}">${sub.status}</span>
                                </div>
                                <div style="text-align: right;">
                                    <div style="font-size: 24px; font-weight: bold; color: #667eea;">
                                        $${(sub.plan?.amount / 100).toFixed(2)}
                                    </div>
                                    <div style="font-size: 12px; color: #6b7280;">per ${sub.plan?.interval}</div>
                                </div>
                            </div>
                            <div style="margin: 15px 0; padding: 15px; background: white; border-radius: 6px;">
                                <p style="margin: 5px 0;"><strong>Period:</strong> ${new Date(sub.current_period_start).toLocaleDateString()} - ${new Date(sub.current_period_end).toLocaleDateString()}</p>
                                <p style="margin: 5px 0;"><strong>Auto Renew:</strong> ${sub.auto_renew ? '✅ Yes' : '❌ No'}</p>
                                ${sub.cancel_at_period_end ? '<p style="color: #ef4444; font-weight: 600;">⚠️ Will cancel at period end</p>' : ''}
                            </div>
                            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                                ${sub.status === 'active' && !sub.cancel_at_period_end ? `
                                    <button class="btn btn-danger" onclick="cancelSubscription(${sub.id})">Cancel</button>
                                ` : ''}
                                ${sub.cancel_at_period_end ? `
                                    <button class="btn btn-success" onclick="resumeSubscription(${sub.id})">Resume</button>
                                ` : ''}
                                <button class="btn btn-secondary" onclick="viewHistory(${sub.id})">View History</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="color: #6b7280;">You don\'t have any subscriptions yet.</p>';
                }
            } catch (error) {
                showAlert('Failed to load subscriptions', 'error');
            }
        }
        async function openSubscribeModal(planId, planName) {
            selectedPlan = planId;
            document.getElementById('modalTitle').textContent = `Subscribe to ${planName}`;
            document.getElementById('paymentModal').classList.remove('hidden');

            // Initialize Stripe
            if (!stripe) {
                stripe = Stripe('pk_test_51TXFvFFf1NjKrMMA9DxXAAvkd66FrPjnlL8Mg812SNlaBKjVCufsKFw60w27GLV1ouFim9XM12LfaQeq536tSofi00Gj3gu58H'); // Replace with your publishable key
                const elements = stripe.elements();
                cardElement = elements.create('card');
                cardElement.mount('#card-element');
            }
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.add('hidden');
        }

        document.getElementById('submitPayment').addEventListener('click', async () => {
            const btn = document.getElementById('submitPayment');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                // Create payment method
                const { paymentMethod, error } = await stripe.createPaymentMethod({
                    type: 'card',
                    card: cardElement,
                });
                if (error) {
                    showAlert(error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Subscribe';
                    return;
                }

                // Subscribe to plan
                const response = await fetch(`${API_BASE}/subscriptions/subscribe`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        plan_id: selectedPlan,
                        payment_method_id: paymentMethod.id
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Subscription created successfully!', 'success');
                    closePaymentModal();
                    loadMySubscriptions();
                } else {
                    showAlert(result.error || 'Subscription failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Subscribe';
            }
        });
        async function cancelSubscription(id) {
            if (!confirm('Are you sure you want to cancel this subscription?')) return;

            const cancelImmediately = confirm('Cancel immediately? (Click Cancel to cancel at period end)');

            try {
                const response = await fetch(`${API_BASE}/subscriptions/${id}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ cancel_immediately: cancelImmediately })
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert(result.message, 'success');
                    loadMySubscriptions();
                } else {
                    showAlert(result.error || 'Cancellation failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function resumeSubscription(id) {
            try {
                const response = await fetch(`${API_BASE}/subscriptions/${id}/resume`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (response.ok) {
                    showAlert(result.message, 'success');
                    loadMySubscriptions();
                } else {
                    showAlert(result.error || 'Resume failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function viewHistory(id) {
            try {
                const response = await fetch(`${API_BASE}/subscriptions/${id}/history`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (response.ok && result.history) {
                    const historyHtml = result.history.map(h => `
                        <div class="history-item">
                            <div class="action">${h.action.replace(/_/g, ' ').toUpperCase()}</div>
                            <div>${h.status_from || 'N/A'} → ${h.status_to}</div>
                            <div class="time">${new Date(h.created_at).toLocaleString()}</div>
                        </div>
                    `).join('');

                    const alertDiv = document.createElement('div');
                    alertDiv.className = 'alert alert-info';
                    alertDiv.innerHTML = `
                        <h3 style="margin-bottom: 15px;">Subscription History</h3>
                        ${historyHtml}
                        <button onclick="this.parentElement.remove()" class="btn btn-secondary" style="margin-top: 10px;">Close</button>
                    `;
                    document.getElementById('alertContainer').appendChild(alertDiv);
                } else {
                    showAlert('No history found', 'info');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        async function handleCreatePlan(event) {
            event.preventDefault();

            const data = {
                name: document.getElementById('planName').value,
                description: document.getElementById('planDescription').value,
                price: parseFloat(document.getElementById('planPrice').value),
                currency: 'usd',
                interval: document.getElementById('planInterval').value,
                interval_count: 1,
                trial_period_days: parseInt(document.getElementById('planTrialDays').value),
                status: 'active'
            };

            try {
                const response = await fetch(`${API_BASE}/subscription-plans`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showAlert('Plan created successfully!', 'success');
                    event.target.reset();
                    loadPlans();
                } else {
                    showAlert(result.error || 'Failed to create plan', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }
    </script>
</body>

</html>
