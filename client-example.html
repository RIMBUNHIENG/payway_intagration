<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Payment Example</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }

        .payment-form {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        button {
            background-color: #635bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background-color: #4f46ba;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #card-element {
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .error {
            color: #e74c3c;
            margin-top: 10px;
        }

        .success {
            color: #27ae60;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h1>Stripe Payment Integration Demo</h1>

    <!-- Payment Intent Form -->
    <div class="payment-form">
        <h2>Payment with Card Element</h2>
        <form id="payment-form">
            <label for="amount">Amount (USD):</label>
            <input type="number" id="amount" placeholder="20.00" step="0.01" required>

            <label for="description">Description:</label>
            <input type="text" id="description" placeholder="Product description" required>

            <div id="card-element"></div>

            <button type="submit" id="submit-button">Pay Now</button>
            <div id="payment-message"></div>
        </form>
    </div>

    <!-- Checkout Session Form -->
    <div class="payment-form">
        <h2>Stripe Checkout</h2>
        <form id="checkout-form">
            <label for="price-id">Price ID:</label>
            <input type="text" id="price-id" placeholder="price_xxxxx" required>

            <button type="submit">Go to Checkout</button>
            <div id="checkout-message"></div>
        </form>
    </div>

    <script>
        // Initialize Stripe with your publishable key
        const stripe = Stripe('pk_test_51TXFvFFf1NjKrMMA9DxXAAvkd66FrPjnlL8Mg812SNlaBKjVCufsKFw60w27GLV1ouFim9XM12LfaQeq536tSofi00Gj3gu58H');
        const API_URL = 'http://localhost:3000';

        // Payment Intent with Card Element
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        const paymentForm = document.getElementById('payment-form');
        const submitButton = document.getElementById('submit-button');
        const paymentMessage = document.getElementById('payment-message');

        paymentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitButton.disabled = true;
            paymentMessage.textContent = 'Processing...';

            const amount = parseFloat(document.getElementById('amount').value) * 100; // Convert to cents
            const description = document.getElementById('description').value;

            try {
                // Create Payment Intent
                const response = await fetch(`${API_URL}/api/payments/create-payment-intent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, description })
                });

                const { clientSecret } = await response.json();

                // Confirm the payment
                const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: cardElement,
                    }
                });

                if (error) {
                    paymentMessage.className = 'error';
                    paymentMessage.textContent = error.message;
                } else if (paymentIntent.status === 'succeeded') {
                    paymentMessage.className = 'success';
                    paymentMessage.textContent = 'Payment successful! Payment ID: ' + paymentIntent.id;
                }
            } catch (error) {
                paymentMessage.className = 'error';
                paymentMessage.textContent = 'Payment failed: ' + error.message;
            }

            submitButton.disabled = false;
        });

        // Checkout Session
        const checkoutForm = document.getElementById('checkout-form');
        const checkoutMessage = document.getElementById('checkout-message');

        checkoutForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            checkoutMessage.textContent = 'Redirecting to checkout...';

            const priceId = document.getElementById('price-id').value;

            try {
                const response = await fetch(`${API_URL}/api/checkout/create-checkout-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ priceId })
                });

                const { url } = await response.json();
                window.location.href = url;
            } catch (error) {
                checkoutMessage.className = 'error';
                checkoutMessage.textContent = 'Failed to create checkout session: ' + error.message;
            }
        });
    </script>
</body>

</html>
